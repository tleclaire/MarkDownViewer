name: Release MdViewerWlx

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build WLX package
        shell: pwsh
        run: |
          & ".\tools\NativeBootstrapper\build-wlx.ps1"

      - name: Read plugin version
        id: plugin_version
        shell: pwsh
        run: |
          $pluginInf = Join-Path $env:GITHUB_WORKSPACE "tools\NativeBootstrapper\pluginst.inf"
          $versionLine = Get-Content -LiteralPath $pluginInf | Where-Object { $_ -match '^version=' } | Select-Object -First 1
          if (-not $versionLine) {
              throw "version=... entry not found in $pluginInf"
          }

          $version = ($versionLine -replace '^version=', '').Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
              throw "Plugin version is empty in $pluginInf"
          }

          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate tag matches plugin version
        shell: pwsh
        run: |
          $expectedTag = "v${{ steps.plugin_version.outputs.value }}"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
              throw "Tag '$env:GITHUB_REF_NAME' does not match plugin version '$expectedTag'."
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: MdViewerWlx ${{ github.ref_name }}
          generate_release_notes: true
          files: deploy/MdViewerWlx-${{ steps.plugin_version.outputs.value }}-tc.zip
